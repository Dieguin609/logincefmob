<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Eixo Central - Login</title>
    <style>
        :root { --primary-yellow: #f1c40f; }
        .logo span { color: var(--primary-yellow) !important; }
        .input-group i { color: var(--primary-yellow) !important; }
        .btn-action.login, .btn-action.register { 
            background: var(--primary-yellow) !important; 
            color: black !important; 
        }
        .footer-text span { color: var(--primary-yellow) !important; }
        #error-msg {
            color: #ff4444; font-size: 0.75rem; font-weight: 800;
            text-align: center; margin-bottom: 15px; display: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="bg-container"><img src="fundo.png" id="bg-img"></div>

    <i id="musicIcon" class="fas fa-pause" onclick="togglePlay()"></i>
    <audio id="myAudio" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="main-container">
        <aside class="sidebar">
            <div class="header"><h1 class="logo">EIXO<span>CENTRAL</span></h1></div>

            <div class="glass-content">
                <div id="error-msg">ESTA CONTA JÁ EXISTE!</div>

                <div id="login-box" class="form-wrapper">
                    <h2>CONECTAR</h2>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pass" placeholder="SUA SENHA">
                    </div>
                    <button class="btn-action login" onclick="login()">ENTRAR NO SERVIDOR</button>
                    <p class="footer-text">Novo por aqui? <span onclick="toggleForm('reg')">Criar conta</span></p>
                </div>

                <div id="register-box" class="form-wrapper" style="display: none;">
                    <h2>BEM-VINDO</h2>
                    <p style="color: #aaa; font-size: 0.7rem; margin-bottom: 20px;">Você não possui uma conta vinculada a este nome.</p>
                    
                    <button class="btn-action register" onclick="checkRegister()">CRIAR NOVO PERSONAGEM</button>
                    <p class="footer-text">Já possui conta? <span onclick="toggleForm('log')">Voltar</span></p>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
    <script>
        function mostrarErroConta() {
            document.getElementById('error-msg').style.display = 'block';
            setTimeout(() => { document.getElementById('error-msg').style.display = 'none'; }, 5000);
        }

        // Função que só avisa o servidor que o cara quer criar conta
        function checkRegister() {
            if (window.geckoju) {
                // O servidor recebe o sinal "check", vê que não tem conta e abre o criacao.html
                window.geckoju.send("checkRegister:null");
            }
        }
    </script>
</body>
</html>
